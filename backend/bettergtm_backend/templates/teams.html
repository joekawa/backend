{% extends 'base.html' %}

{% block content %}
<div class='table-responsive'>
    <table class="table table-striped mx-auto">
      <thead>
      <tr>
        <th scope="col">Name</th>
        <th scope="col">Short Name</th>
        <th scope='col'>Description</th>
      </tr>
      </thead>
      <tbody>
        {% for t in teams %}
      <tr>
        <td><a href="{% url 'bettergtm_backend:team_detail' t.id%}"">{{ t.name }}</a></td>
        <td>{{ t.short_name }}</td>
        <td>{{ t.description }}</td>
      </tr>
      {% endfor %}
    </tbody>
    </table>
  </div>
{% endblock %}
