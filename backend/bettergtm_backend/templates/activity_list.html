{% extends 'base.html' %}
{% block content %}

<div class='table-responsive'>
  <table class="table table-striped mx-auto">
    <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Description</th>
      <th scope='col'>Due Date</th>
      <th scope="col">Status</th>
      <th scope="col">Release</th>
    </tr>
    </thead>
    <tbody>
      {% for a in activities %}
    <tr>
      <td>{{ a.name }}</td>
      <td>{{ a.description }}</td>
      <td>{{ a.due_date }}</td>
      <td>{{ a.status }}</td>
      <td>{{ a.release }}</td>
    </tr>
    {% endfor %}
  </tbody>
  </table>
</div>


{% endblock %}
