{% extends 'base.html' %}
{% block content %}

<div class='table-responsive'>
  <table class="table table-striped mx-auto">
    <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Description</th>
      <th scope='col'>Release Date</th>
      <th scope="col">Type</th>
      <th scope="col">Status</th>
    </tr>
    </thead>
    <tbody>
      {% for r in releases %}
    <tr>
      <td><!--<a href="{% url 'bettergtm_backend:customer_detail' r.id%}"">-->{{ r.name }}</td>
      <td>{{ r.description }}</td>
      <td>{{ r.release_date }}</td>
      <td>{{ r.type }}</td>
      <td>{{ r.status }}</td>
    </tr>
    {% endfor %}
  </tbody>
  </table>
</div>


{% endblock %}
